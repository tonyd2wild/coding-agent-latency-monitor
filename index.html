<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coding Agent Latency Monitor</title>
<style>
  :root{--bg:#0b0e14;--panel:#121620;--card:#161b26;--edge:#232a38;--ink:#e6edf3;--dim:#8b97a7;
        --teal:#2dd4bf;--org:#f5a524;--pur:#a78bfa;--grn:#34d399;--red:#f87171;--blue:#60a5fa}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);
    font:13px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace}
  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:12px 16px;border-bottom:1px solid var(--edge)}
  h1{font-size:16px;margin:0;font-weight:700}
  .meta{color:var(--dim);font-size:12px} .meta b{color:var(--ink);font-weight:600}
  .cfg{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-left:auto}
  .cfg label{color:var(--dim);font-size:11px;display:flex;flex-direction:column;gap:2px}
  input,select,textarea{background:var(--card);border:1px solid var(--edge);color:var(--ink);border-radius:6px;padding:5px 7px;font:12px ui-monospace,monospace}
  .prompt{width:240px} input.num{width:66px}
  textarea.prompt{height:28px;min-height:28px;max-height:120px;resize:vertical;vertical-align:top}
  input[type=checkbox]{accent-color:var(--teal);margin:0;padding:0}
  #mixrow{display:none;flex-basis:100%;flex-wrap:wrap;gap:4px 12px;align-items:center;justify-content:flex-end}
  .cfg #mixrow label{flex-direction:row;align-items:center;gap:5px;white-space:nowrap;cursor:pointer}
  button{border:none;border-radius:7px;padding:8px 16px;font-weight:700;cursor:pointer;
    transition:transform .07s ease,filter .15s ease,opacity .15s ease,box-shadow .2s ease}
  button:hover:not(:disabled){filter:brightness(1.15)}
  button:active:not(:disabled){transform:translateY(1px) scale(.95)}
  button:disabled{opacity:.35;cursor:not-allowed;filter:grayscale(.35)}
  #run{background:var(--grn);color:#04120c} #stop{background:var(--card);color:var(--ink);border:1px solid var(--edge)}
  #kill{background:var(--red);color:#1a0505;font-weight:800}
  #clear{background:var(--card);color:var(--dim);border:1px solid var(--edge)}
  body.running #kill{animation:killpulse 1.5s ease-in-out infinite}
  @keyframes killpulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0)}50%{box-shadow:0 0 0 5px rgba(248,113,113,.22)}}
  .bar{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--edge)}
  .total{background:#0e2a26;color:var(--teal);border:1px solid #164e46;border-radius:8px;padding:5px 12px;font-weight:700}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px;padding:14px 16px}
  .rc{background:var(--card);border:1px solid var(--edge);border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
  .rc h3{margin:0;padding:9px 12px;font-size:13px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--edge)}
  .pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
  .pill.idle{background:#1e2532;color:var(--dim)} .pill.think{background:#241f3a;color:var(--pur)}
  .pill.answer{background:#0e2a26;color:var(--teal)} .pill.done{background:#12261a;color:var(--grn)} .pill.err{background:#2a1414;color:var(--red)}
  .m4{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--edge)}
  .m{background:var(--card);padding:7px 9px} .m .k{color:var(--dim);font-size:10px} .m .v{font-size:16px;font-weight:700}
  .ttft .v{color:var(--teal)} .tps .v{color:var(--pur)} .e2e .v{color:var(--org)} .tok .v{color:var(--ink)}
  pre{margin:0;padding:9px 12px;height:150px;overflow:auto;white-space:pre-wrap;color:#c3ccd8;font-size:11.5px;background:#0d1119}
  #hw{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1px;background:var(--edge);border-top:1px solid var(--edge)}
  .hw{background:#160f14;padding:10px 14px} .hw .k{color:var(--dim);font-size:10px} .hw .v{font-size:14px;font-weight:700;color:var(--red)}
  .sec{padding:8px 16px;color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.06em;display:flex;justify-content:space-between;align-items:center}
  #summary{padding:0 16px 20px}
  .stiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:12px}
  .st{background:var(--card);border:1px solid var(--edge);border-radius:10px;padding:11px 13px}
  .st .k{color:var(--dim);font-size:10px;text-transform:uppercase} .st .v{font-size:22px;font-weight:800;margin-top:3px}
  .st .u{color:var(--dim);font-size:11px;font-weight:400}
  #share{width:100%;background:#0d1119;border:1px solid var(--edge);border-radius:10px;color:#cbd5e1;padding:12px;white-space:pre-wrap;font-size:12px}
  #copybtn{background:var(--blue);color:#04121f;margin-top:8px}
  .tabs{display:flex;gap:4px;padding:10px 16px 0}
  .tab{background:var(--card);border:1px solid var(--edge);border-bottom:none;color:var(--dim);
    border-radius:8px 8px 0 0;padding:8px 16px;font-weight:700;cursor:pointer;transition:filter .15s}
  .tab:hover{filter:brightness(1.15)} .tab.active{background:var(--panel);color:var(--ink)}
  .pastbar{display:flex;gap:10px;align-items:center;padding:14px 16px;border-bottom:1px solid var(--edge);flex-wrap:wrap}
  #psearch{flex:0 0 300px;max-width:60vw}
  #pchart{padding:14px 16px;display:flex;flex-direction:column;gap:5px}
  .cbar{display:flex;align-items:center;gap:8px;font-size:11px}
  .cbar .lbl{flex:0 0 200px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}
  .cbar .track{flex:1;background:var(--card);border-radius:4px;height:15px;position:relative;overflow:hidden}
  .cbar .fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#2dd4bf,#60a5fa);border-radius:4px}
  .cbar .val{flex:0 0 84px;color:var(--teal);font-weight:700}
  .tbwrap{overflow-x:auto;padding:0 16px 24px}
  table.pt{width:100%;border-collapse:collapse;font-size:11.5px}
  table.pt th,table.pt td{padding:7px 9px;border-bottom:1px solid var(--edge);text-align:right;white-space:nowrap}
  table.pt th{color:var(--dim);text-transform:uppercase;font-size:10px;cursor:pointer;position:sticky;top:0;background:var(--bg)}
  table.pt td.l,table.pt th.l{text-align:left}
  table.pt tr:hover td{background:#141a25}

  /* ===== Matrix Mode (additive overrides only — normal theme untouched when body.matrix absent) ===== */
  #mrain{display:none;position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.22}
  #mtx{background:var(--card);color:var(--dim);border:1px solid var(--edge)}
  body.matrix{--bg:#000;--panel:#000;--card:#010b03;--edge:#0b3d1a;--ink:#00ff41;--dim:#00a832;
    --teal:#00ff41;--org:#57ff86;--pur:#2fe864;--grn:#00ff41;--red:#8dffab;--blue:#39ff6f}
  body.matrix #mrain{display:block}
  body.matrix header,body.matrix .tabs,body.matrix #liveview,body.matrix #pastview{position:relative;z-index:1}
  body.matrix button{background:#000;color:#00ff41;border:1px solid #00ff41;text-shadow:0 0 5px rgba(0,255,65,.55)}
  body.matrix #run,body.matrix #stop,body.matrix #clear,body.matrix #copybtn{background:#000;color:#00ff41;border:1px solid #00ff41}
  body.matrix #kill{background:#000;color:#a8ffbf;border:1px solid #a8ffbf}
  body.matrix #mtx{background:#00ff41;color:#000;text-shadow:none;box-shadow:0 0 12px rgba(0,255,65,.55)}
  @keyframes killpulseM{0%,100%{box-shadow:0 0 0 0 rgba(0,255,65,0)}50%{box-shadow:0 0 0 5px rgba(0,255,65,.3)}}
  body.matrix.running #kill{animation:killpulseM 1.5s ease-in-out infinite}
  body.matrix .tab{border-bottom:none}
  body.matrix .tab.active{background:#000;color:#00ff41;border-color:#00ff41}
  body.matrix .total{background:#001505;color:#00ff41;border-color:#00ff41;text-shadow:0 0 6px rgba(0,255,65,.5)}
  body.matrix .pill.idle{background:#001505;color:#00a832}
  body.matrix .pill.think{background:#001505;color:#2fe864}
  body.matrix .pill.answer{background:#002b0a;color:#00ff41}
  body.matrix .pill.done{background:#00ff41;color:#000}
  body.matrix .pill.err{background:#000;color:#a8ffbf;outline:1px solid #a8ffbf}
  body.matrix pre{background:rgba(0,0,0,.82);color:#00ff41;text-shadow:0 0 6px rgba(0,255,65,.55)}
  body.matrix #share{background:rgba(0,0,0,.82);color:#00ff41;border-color:#0b3d1a;text-shadow:0 0 6px rgba(0,255,65,.45)}
  body.matrix .hw{background:#000c03}
  body.matrix .hw .v{color:#00ff41}
  body.matrix table.pt tr:hover td{background:#001c07}
  body.matrix .cbar .track{background:#001505}
  body.matrix .cbar .fill{background:linear-gradient(90deg,#00ff41,#0a5f26)}
</style></head>
<body>
<canvas id="mrain" aria-hidden="true"></canvas>
<header>
  <h1>⚡ Coding Agent Latency Monitor</h1>
  <span class="meta">Model: <b id="mLabel">—</b> · Endpoint: <b id="mEp">—</b></span>
  <div class="cfg">
    <label>Endpoint<select id="preset"></select></label>
    <label>Preset<select id="pprompt"></select></label>
    <label>Prompt<textarea class="prompt" id="prompt" rows="1">Build a complete single-file HTML5 canvas game called Protocol Starfall: a top-down space shooter with waves of enemies, score, health, and a game-over screen. Return only the full HTML.</textarea></label>
    <label>Mode<select id="pmode"><option value="single" selected>Single prompt</option><option value="mixed">Mixed presets</option></select></label>
    <label>Quant/note<input class="num" id="quant" style="width:104px" placeholder="Int4" value=""></label>
    <label>Parallel<input class="num" id="par" type="number" value="6" min="1" max="32"></label>
    <label>Max tok<input class="num" id="mx" type="number" value="4096"></label>
    <label>Temp<input class="num" id="temp" type="number" value="0.2" step="0.1"></label>
    <label>Think<select id="think"><option value="0" selected>off</option><option value="1">on</option></select></label>
    <button id="run">▶ Run</button><button id="stop">■ Stop</button><button id="kill">🛑 KILL ALL</button><button id="clear">🧹 Clear</button><button id="mtx">🟩 Matrix</button>
    <div id="mixrow"></div>
  </div>
</header>
<div class="tabs">
  <button class="tab active" id="tab-live" onclick="showTab('live')">⚡ Live Monitor</button>
  <button class="tab" id="tab-past" onclick="showTab('past')">📊 Past Runs</button>
  <button class="tab" id="tab-art" onclick="showTab('art')">🎨 Art Mode</button>
</div>
<div id="liveview">
<div class="bar"><span class="sec" style="padding:0">Streaming Outputs</span><span class="total" id="total">Total live 0.0 tok/s</span></div>
<div id="grid"></div>
<div class="sec">Hardware Metrics</div>
<div id="hw"></div>
<div class="sec" id="sumhdr" style="display:none">Run Summary <button id="copybtn" style="padding:5px 12px">📋 Copy for sharing</button></div>
<div id="summary" style="display:none"></div>
</div><!-- /liveview -->

<div id="pastview" style="display:none">
  <div class="pastbar">
    <input id="psearch" placeholder="🔍 search model / quant / cluster…" oninput="renderPast()">
    <select id="pmodel" onchange="renderPast()"><option value="">All models</option></select>
    <span id="pcount" class="meta"></span>
    <span id="pstore" class="meta" style="margin-left:auto;font-size:10px"></span>
  </div>
  <div id="pchart"></div>
  <div id="ptable"></div>
</div>

<div id="artview" style="display:none">
  <div class="pastbar">
    <label style="color:var(--dim);font-size:11px;display:flex;flex-direction:column;gap:2px">Shape
      <input id="ashape" style="width:260px" value="a sine wave"></label>
    <label style="color:var(--dim);font-size:11px;display:flex;flex-direction:column;gap:2px">Agents
      <input class="num" id="an" type="number" value="6" min="1" max="16"></label>
    <label style="color:var(--dim);font-size:11px;display:flex;flex-direction:column;gap:2px">Width
      <input class="num" id="aw" type="number" value="120" min="20" max="240"></label>
    <label style="color:var(--dim);font-size:11px;display:flex;flex-direction:column;gap:2px">Height
      <input class="num" id="ah" type="number" value="24" min="6" max="60"></label>
    <button id="arun" style="background:var(--pur);color:#12071f">🎨 Draw</button>
    <span id="astat" class="meta"></span>
  </div>
  <div class="sec">Agents drawing their slices (live)</div>
  <div id="aslices" style="display:flex;gap:2px;overflow-x:auto;padding:10px 16px"></div>
  <div class="sec">Stitched result — <span id="ameta" style="text-transform:none"></span></div>
  <pre id="acanvas" style="height:auto;max-height:560px;font-size:11px;line-height:1.05;letter-spacing:0"></pre>
</div>

<script>
let CTRL=null, HWTIMER=null, PRESETS={}, PEAK=0, RUN_T0=0, META={}, SUMMED=false;
const $=id=>document.getElementById(id);

// ---- Prompt preset library (Mixed Prompts feature) ----
const PRESET_PROMPTS=[
 {key:'game',label:'🎮 HTML5 Game',short:'🎮 Game',
  prompt:'Build a complete single-file HTML5 canvas game called Protocol Starfall: a top-down space shooter with waves of enemies, score, health, and a game-over screen. Return only the full HTML.'},
 {key:'json',label:'📦 JSON Generator',short:'📦 JSON',
  prompt:'Generate a strict JSON dataset: an array of exactly 25 e-commerce product objects, each with fields id, name, brand, category, price, currency, in_stock, tags (array of 3 strings), and description (two sentences). Output ONLY valid JSON — no prose, no markdown fences, no comments.'},
 {key:'narrative',label:'📖 Narrative',short:'📖 Story',
  prompt:'Write a 600-word short story about a night-shift engineer who discovers her datacenter\'s cooling system is being quietly sabotaged. Include at least three exchanges of spoken dialogue between two characters, and end with a twist in the final paragraph.'},
 {key:'reasoning',label:'🧠 Reasoning',short:'🧠 Reason',
  prompt:'Solve this step by step, showing all working: A warehouse ships 3 truckloads on Monday, then each day ships 20% more truckloads than the previous day, rounded up to a whole truck. Each truck holds 48 crates and each crate holds 36 units. How many total units are shipped Monday through Friday? Lay out each day\'s calculation, then verify your arithmetic at the end.'},
 {key:'refactor',label:'🔧 Code Refactor',short:'🔧 Refactor',
  prompt:'Refactor this messy Python function into clean idiomatic code (clear names, type hints, no duplication, early returns), then write pytest unit tests covering normal, edge, and error cases:\n\ndef proc(d):\n    r = []\n    for i in range(len(d)):\n        if d[i] != None:\n            if type(d[i]) == dict:\n                if "price" in d[i].keys() and d[i]["price"] > 0:\n                    x = d[i]["price"]\n                    if d[i].get("disc"):\n                        x = x - x * d[i]["disc"] / 100.0\n                    r.append({"n": d[i].get("name", "unk"), "p": round(x, 2)})\n    t = 0\n    for e in r:\n        t = t + e["p"]\n    return (r, t)'},
 {key:'sql',label:'🗄️ SQL',short:'🗄️ SQL',
  prompt:'Given PostgreSQL tables orders(order_id, customer_id, order_date, status, total_cents), order_items(order_id, sku, qty, unit_price_cents), and customers(customer_id, region, signup_date), write ONE analytical query that returns, per region and per month over the last 12 months: total revenue, order count, unique customers, average order value, and month-over-month revenue growth percent. Use CTEs and window functions, then briefly explain what each CTE does.'},
 {key:'agent',label:'🤖 Agent Plan',short:'🤖 Agent',
  prompt:'You are an autonomous agent with tools web_search(query), read_file(path), write_file(path, content), and run_shell(cmd). Plan this task as a structured tool-call sequence: audit a Python repo for vulnerable dependencies and produce a patched requirements.txt plus a short findings report. Output numbered steps, each with the tool name, exact arguments, the expected output, and a fallback if that step fails.'},
 {key:'techdoc',label:'📝 Tech Doc',short:'📝 Doc',
  prompt:'Write complete API documentation in Markdown for POST /v1/inventory/reserve, an endpoint that reserves stock for a shopping cart. Request body: {cart_id, items:[{sku, qty}], ttl_seconds}; returns 200 with reservation_id and expires_at, or 409 when stock is insufficient. Include an overview, authentication, a parameters table, example request and response JSON, every error code, and rate-limit notes.'}
];
const DEFAULT_MIX=['game','json','narrative','reasoning'];
function checkedMix(){return PRESET_PROMPTS.filter(p=>{const cb=document.querySelector('#mixrow input[data-key="'+p.key+'"]');return cb&&cb.checked;});}
(function initPromptPresets(){
  const sel=$('pprompt');
  PRESET_PROMPTS.forEach(p=>{const o=document.createElement('option');o.value=p.key;o.textContent=p.label;sel.appendChild(o);});
  sel.value='game';
  sel.addEventListener('change',()=>{const p=PRESET_PROMPTS.find(x=>x.key===sel.value);if(p)$('prompt').value=p.prompt;});
  const row=$('mixrow');
  PRESET_PROMPTS.forEach(p=>{
    const l=document.createElement('label');
    const cb=document.createElement('input');cb.type='checkbox';cb.dataset.key=p.key;cb.checked=DEFAULT_MIX.includes(p.key);
    l.appendChild(cb);l.appendChild(document.createTextNode(' '+p.label));row.appendChild(l);});
  $('pmode').addEventListener('change',()=>{row.style.display=$('pmode').value==='mixed'?'flex':'none';});
})();
function setRunning(on){$('run').disabled=on;$('stop').disabled=!on;document.body.classList.toggle('running',on);$('run').textContent=on?'▶ Running…':'▶ Run';}
async function loadPresets(){
  PRESETS=await (await fetch('/presets')).json();
  const sel=$('preset'); sel.innerHTML='';
  Object.keys(PRESETS).forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=k;sel.appendChild(o);});
  syncLabel();
}
function cur(){const [ep,model]=PRESETS[$('preset').value].split('|');return {ep,model};}
function syncLabel(){const c=cur();$('mLabel').textContent=c.model;$('mEp').textContent=c.ep;}
$('preset').addEventListener('change',syncLabel);

function card(i,tag){
  const el=document.createElement('div');el.className='rc';el.id='rc'+i;
  el.innerHTML=`<h3>Run ${i}${tag?' · '+tag:''} <span class="pill think" id="p${i}">thinking</span></h3>
    <div class="m4">
      <div class="m ttft"><div class="k">TTFT</div><div class="v" id="ttft${i}">—</div></div>
      <div class="m tps"><div class="k">Live tok/s</div><div class="v" id="tps${i}">—</div></div>
      <div class="m e2e"><div class="k">E2E</div><div class="v" id="e2e${i}">—</div></div>
      <div class="m tok"><div class="k">Tokens</div><div class="v" id="tok${i}">0</div></div>
    </div><pre id="out${i}"></pre>`;
  return el;
}
const R={};
function agg(){let s=0;for(const k in R)s+=R[k].tps||0; if(s>PEAK)PEAK=s; $('total').textContent=`Total live ${s.toFixed(1)} tok/s`;}

function finalize(i,state){
  const r=R[i]; if(!r||r.final)return; r.final=true;
  r.e2eS=(performance.now()-r.t0)/1000; r.finalTokens=r.usageTok||Math.round(r.chars/4);
  const p=$('p'+i);
  if(state==='done'){p.className='pill done';p.textContent='done';$('e2e'+i).textContent=r.e2eS.toFixed(1)+'s';}
  else if(state==='err'){p.className='pill err';p.textContent='error';}
  else{p.className='pill idle';p.textContent='killed';}
  r.tps=0; agg();
  if(Object.values(R).every(x=>x.final)){setRunning(false); renderSummary();}
}
function onEvent(ev){
  const i=ev.run, r=R[i]; if(!r)return; const out=$('out'+i),p=$('p'+i);
  if(ev.err){out.textContent='⚠ '+ev.err; finalize(i,'err'); return;}
  if(ev.killed){finalize(i,'killed'); return;}
  if(ev.done){finalize(i,'done'); return;}
  const delta=ev.c||'';
  if(delta){ if(r.tFirst===null){r.tFirst=performance.now();r.ttftS=(r.tFirst-r.t0)/1000;$('ttft'+i).textContent=r.ttftS.toFixed(2)+'s';p.className='pill answer';p.textContent='answering';}
    r.chars+=delta.length; r.txt+=delta; if(r.txt.length<20000){out.textContent=r.txt;out.scrollTop=out.scrollHeight;} }
  if(ev.u)r.usageTok=ev.u;
  if(r.tFirst){const est=r.usageTok||Math.round(r.chars/4),dt=(performance.now()-r.tFirst)/1000;
    $('tok'+i).textContent=est;
    if(dt>0.4){r.tps=est/dt; if(r.tps>(r.peakTps||0))r.peakTps=r.tps; $('tps'+i).textContent=r.tps.toFixed(1); agg();}}
}

function renderSummary(){
  if(SUMMED)return; SUMMED=true;
  const runs=Object.values(R).filter(r=>r.finalTokens>0);
  if(!runs.length){return;}
  const tpss=runs.map(r=>r.peakTps||0), toks=runs.map(r=>r.finalTokens||0);
  const ttfts=runs.map(r=>r.ttftS).filter(x=>x!=null), e2es=runs.map(r=>r.e2eS).filter(x=>x!=null);
  const mean=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
  const hi=Math.max(...tpss), lo=Math.min(...tpss), av=mean(tpss);
  const totalTok=toks.reduce((x,y)=>x+y,0);
  const wall=(performance.now()-RUN_T0)/1000;
  const combined=totalTok/wall;
  const st=(k,v,u)=>`<div class="st"><div class="k">${k}</div><div class="v">${v}<span class="u"> ${u||''}</span></div></div>`;
  $('summary').innerHTML=`<div class="stiles">
    ${st('Peak aggregate',PEAK.toFixed(1),'tok/s')}
    ${st('Combined avg',combined.toFixed(1),'tok/s')}
    ${st('Per-stream high',hi.toFixed(1),'tok/s')}
    ${st('Per-stream low',lo.toFixed(1),'tok/s')}
    ${st('Per-stream avg',av.toFixed(1),'tok/s')}
    ${st('Total tokens',totalTok.toLocaleString(),'')}
    ${st('Avg TTFT',mean(ttfts).toFixed(2),'s')}
    ${st('Avg E2E',mean(e2es).toFixed(1),'s')}
    ${st('Parallel',runs.length,'runs')}
    ${st('Wall time',wall.toFixed(1),'s')}
  </div><pre id="share"></pre>`;
  const share=
`🚀 ${META.model} on ${META.hw} — ${runs.length} parallel coding agents

${META.mix?`• Mixed prompts: ${META.mix.labels.join(', ')}\n`:''}Recipe by @Tech2Wild`;

async function pollHw(c){
  try{const h=await (await fetch('/hw?ep='+encodeURIComponent(c.ep))).json();
    let html='';
    if(h.gpus&&h.gpus.length){h.gpus.forEach(g=>{const pct=(+g.total>0)?Math.round(100*g.used/g.total):0;const hot=(+g.temp>=80);
      html+=`<div class="hw"><div class="k">GPU ${g.i} · ${g.temp||'?'}°C</div><div class="v" style="${hot?'color:#fca5a5':''}">${g.util}% · ${g.used}/${g.total}MiB (${pct}%)</div></div>`;});
      if(h.ram)html+=`<div class="hw"><div class="k">System RAM used</div><div class="v">${h.ram} GiB</div></div>`;}
    html+=`<div class="hw"><div class="k">Req running</div><div class="v">${h.running??'—'}</div></div>
      <div class="hw"><div class="k">Req waiting</div><div class="v">${h.waiting??'—'}</div></div>

      <div class="hw"><div class="k">Model</div><div class="v" style="color:var(--blue);font-size:12px">${c.model}</div></div>`;

// ---- 🎨 Art Mode: N agents each render one vertical slice of the same canvas; stitched live ----
let ARTCTRL=null;
function stripFences(t){return t.replace(/```[a-z]*\n?/gi,'').replace(/```/g,'').replace(/^\s*\n/,'').replace(/\s+$/,'');}
function stitchArt(texts,n,w,h){
  const sw=[],out=[];
  for(let i=1;i<=n;i++){const x0=Math.floor((i-1)*w/n),x1=Math.floor(i*w/n);sw.push(x1-x0);}
  const grids=texts.map((t,idx)=>{
    let lines=stripFences(t||'').split('\n');
    if(lines.length>h)lines=lines.slice(0,h);
    while(lines.length<h)lines.push('');
    return lines.map(l=>l.replace(/\t/g,' ').padEnd(sw[idx]).slice(0,sw[idx]));
  });
  for(let r=0;r<h;r++)out.push(grids.map(g=>g[r]).join(''));
  return out.join('\n');
}
$('arun').onclick=async ()=>{
  if(ARTCTRL)ARTCTRL.abort(); ARTCTRL=new AbortController();
  const c=cur(), n=Math.max(1,Math.min(16,+$('an').value)), w=+$('aw').value, h=+$('ah').value;
  const texts=Array(n).fill(''); let done=0;
  $('aslices').innerHTML=Array.from({length:n},(_,i)=>`<pre id="asl${i+1}" style="flex:1 0 auto;min-width:60px;height:200px;font-size:8px;line-height:1.05">agent ${i+1}…</pre>`).join('');
  $('acanvas').textContent=''; $('ameta').textContent=`"${$('ashape').value}" · ${n} agents · ${w}×${h}`;
  $('astat').textContent='⏳ drawing…';
  const url=`/artall?ep=${encodeURIComponent(c.ep)}&model=${encodeURIComponent(c.model)}&shape=${encodeURIComponent($('ashape').value)}&w=${w}&h=${h}&n=${n}&temp=0.2&think=0`;
  try{
    const r=await fetch(url,{signal:ARTCTRL.signal}); const rd=r.body.getReader(),dec=new TextDecoder(); let buf='';
    while(true){const {done:d,value}=await rd.read(); if(d)break; buf+=dec.decode(value,{stream:true});
      let nl; while((nl=buf.indexOf('\n\n'))>=0){const blk=buf.slice(0,nl); buf=buf.slice(nl+2);
        const dl=blk.split('\n').find(l=>l.startsWith('data:')); if(!dl)continue;
        let ev; try{ev=JSON.parse(dl.slice(5).trim())}catch{continue}
        const i=ev.run; if(!i)continue;
        if(ev.c){texts[i-1]+=ev.c; const el=$('asl'+i); if(el){el.textContent=stripFences(texts[i-1]); el.scrollTop=el.scrollHeight;}}
        if(ev.done||ev.err||ev.killed){done++; $('astat').textContent=`⏳ ${done}/${n} slices done…`;
          $('acanvas').textContent=stitchArt(texts,n,w,h);}
      }}
    $('acanvas').textContent=stitchArt(texts,n,w,h);
    $('astat').textContent=`✅ ${n} agents, stitched ${w}×${h}`;
  }catch(e){if(!ARTCTRL.signal.aborted)$('astat').textContent='❌ '+e.message;}
};
async function saveRun(rec){try{await fetch('/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(rec)});}catch(e){}}
async function loadPastRuns(){try{const d=await (await fetch('/runs')).json(); PAST=d.runs||[];
  $('pstore').textContent='stored: '+(d.store||'');
  const sel=$('pmodel'),cur=sel.value,models=[...new Set(PAST.map(r=>r.model))].sort();
  sel.innerHTML='<option value="">All models</option>'+models.map(m=>`<option${m===cur?' selected':''}>${m}</option>`).join('');
  renderPast();}catch(e){}}
function fmt(v,d){d=(d==null?1:d);return (v==null||isNaN(+v))?'—':(+v).toFixed(d);}
function renderPast(){
  const q=($('psearch').value||'').toLowerCase(),mf=$('pmodel').value;
  const rows=PAST.filter(r=>(!mf||r.model===mf)&&(!q||`${r.model} ${r.quant||''} ${r.cluster||''}`.toLowerCase().includes(q)));
  $('pcount').textContent=rows.length+' run'+(rows.length===1?'':'s');
  const cr=rows.slice(0,20),mx=Math.max(1,...cr.map(r=>+r.sustained||0));
  $('pchart').innerHTML=cr.length?cr.map(r=>`<div class="cbar"><span class="lbl">${r.model} · ${r.parallel}p${r.quant?' · '+r.quant:''}</span><span class="track"><span class="fill" style="width:${100*(+r.sustained||0)/mx}%"></span></span><span class="val">${(+r.sustained||0).toFixed(1)} t/s</span></div>`).join(''):'<span class="meta">no runs yet — finish a run and it lands here</span>';
  const cols=['Time','Model','Quant','Cluster','Par','Peak agg','Sustained','Hi','Lo','Avg','TTFT','E2E','Tokens'];
  const th=cols.map((x,i)=>`<th class="${i<4?'l':''}">${x}</th>`).join('');
  const td=rows.map(r=>`<tr><td class="l">${(r.ts||'').replace('T',' ').slice(0,16)}</td><td class="l">${r.model||''}</td><td class="l">${r.quant||'—'}</td><td class="l">${r.cluster||''}</td><td>${r.parallel||''}</td><td>${fmt(r.peak)}</td><td>${fmt(r.sustained)}</td><td>${fmt(r.hi)}</td><td>${fmt(r.lo)}</td><td>${fmt(r.avg)}</td><td>${fmt(r.ttft,2)}</td><td>${fmt(r.e2e,0)}</td><td>${(+r.total||0).toLocaleString()}</td></tr>`).join('');
  $('ptable').innerHTML=`<div class="tbwrap"><table class="pt"><thead><tr>${th}</tr></thead><tbody>${td}</tbody></table></div>`;
}
loadPresets(); setRunning(false);
</script>
<script>
/* ---- Matrix Mode: theme toggle + digital rain (additive; app logic above is untouched) ---- */
(function(){
  const cv=document.getElementById('mrain'), btn=document.getElementById('mtx');
  const GLYPHS='アィイウェエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=<>#%@';
  const FS=16; let ctx=null, raf=null, cols=0, drops=[], last=0;
  function resize(){
    cv.width=window.innerWidth; cv.height=window.innerHeight;
    const n=Math.ceil(cv.width/FS), old=drops; cols=n; drops=[];
    for(let i=0;i<n;i++)drops[i]=(old[i]!==undefined)?old[i]:Math.floor(Math.random()*-60);
  }
  function frame(t){
    raf=requestAnimationFrame(frame);
    if(t-last<50)return; last=t;
    ctx.fillStyle='rgba(0,0,0,0.10)'; ctx.fillRect(0,0,cv.width,cv.height);
    ctx.font=FS+'px ui-monospace,Menlo,monospace';
    for(let i=0;i<cols;i++){
      const y=drops[i]*FS;
      if(y>0){
        ctx.fillStyle=(Math.random()<0.10)?'#c8ffd8':'#00ff41';
        ctx.fillText(GLYPHS[(Math.random()*GLYPHS.length)|0], i*FS, y);
      }
      if(y>cv.height&&Math.random()>0.972)drops[i]=Math.floor(Math.random()*-30);
      else drops[i]++;
    }
  }
  function startRain(){
    if(raf!==null)return;
    ctx=cv.getContext('2d'); resize();
    window.addEventListener('resize',resize);
    last=0; raf=requestAnimationFrame(frame);
  }
  function stopRain(){
    if(raf!==null){cancelAnimationFrame(raf); raf=null;}
    window.removeEventListener('resize',resize);
    if(ctx)ctx.clearRect(0,0,cv.width,cv.height);
  }
  function applyMatrix(on){
    document.body.classList.toggle('matrix',on);
    if(on)startRain(); else stopRain();
    try{localStorage.setItem('calm_matrix',on?'1':'0');}catch(e){}
  }
  btn.addEventListener('click',()=>applyMatrix(!document.body.classList.contains('matrix')));
  let saved=false; try{saved=localStorage.getItem('calm_matrix')==='1';}catch(e){}
  if(saved)applyMatrix(true);
})();
</script></body></html>
